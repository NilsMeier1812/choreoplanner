<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Choreo-Planer</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <link rel="icon" href="./assets/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body x-data="choreo" x-init="init()" x-cloak>

  <!-- ===== Audio-Bereich (oberes Drittel) ===== -->
  <section id="audio-section">
    <div class="topbar">
      <button class="icon" @click="menuOpen = true" aria-label="Menü">☰</button>
      <div class="title">
        <span x-text="project ? project.title : 'Kein Projekt'"></span>
        <template x-if="activeTempo">
          <span class="meta" x-text="` · ${activeTempo.bpm} BPM · ${activeTempo.time_signature}`"></span>
        </template>
      </div>
      <span x-show="!online" class="badge offline">offline</span>
      <button class="icon" x-show="project && isEditor" @click="openSettings()" aria-label="Projekt-Einstellungen">⚙️</button>
      <div class="mode-toggle" x-show="project">
        <button :class="{ active: currentMode === 'training' }"
                @click="currentMode === 'editor' && toggleMode()">Training</button>
        <button :class="{ active: currentMode === 'editor' }"
                @click="currentMode === 'training' && toggleMode()">Editor<span x-show="!isEditor"> 🔒</span></button>
      </div>
    </div>

    <div id="waveform">
      <div class="loading-overlay" x-show="audioLoading" x-cloak>
        <div class="spinner"></div>
        <div>Lade Audio…</div>
      </div>
      <div class="loading-overlay" x-show="audioError" x-cloak>
        <div class="audio-error" x-text="audioError"></div>
        <button @click="project && loadAudio(project)">Erneut versuchen</button>
      </div>
      <div class="loading-overlay" x-show="!project && !audioLoading" x-cloak>
        <div style="text-align:center">
          <div>Kein Projekt geöffnet.</div>
          <button class="primary" style="margin-top:10px" @click="menuOpen = true">Projekt wählen</button>
        </div>
      </div>
    </div>

    <!-- mitlaufende Schritt-Lanes (Canvas wird per JS eingehängt) -->
    <div id="lanes">
      <span class="lane-label lane-h">L</span>
      <span class="lane-label lane-d">F</span>
    </div>
  </section>

  <!-- ===== Controls-Leiste ===== -->
  <div id="controls-bar">
    <button class="play-btn" @click="togglePlay()" :disabled="!project || audioLoading" aria-label="Play/Pause">
      <svg x-show="!isPlaying" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
      <svg x-show="isPlaying" x-cloak width="22" height="22" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg>
    </button>
    <span class="time" x-text="fmt(currentTime) + ' / ' + fmt(duration)"></span>
    <span class="spacer"></span>
    <button class="icon" @click="zoomOut()" :disabled="!project" aria-label="Verkleinern">−</button>
    <button class="icon" @click="zoomIn()" :disabled="!project" aria-label="Vergrößern">+</button>
    <button class="icon" @click="cycleStepDisplay()" :disabled="!project" x-text="stepDisplayIcon" title="Schritt-Anzeige: Punkte / L·S·U / Zahlen"></button>
    <button x-show="currentMode === 'editor'" class="primary" @click="addSegmentAtCursor()">＋ Marke</button>
  </div>

  <!-- ===== Unterer Bereich: Tabs ===== -->
  <section id="bottom-section">
    <div class="tabbar">
      <button :class="{ active: bottomTab === 'steps' }" @click="setTab('steps')">Schritte &amp; Gruppen</button>
      <button :class="{ active: bottomTab === 'notes' }" @click="setTab('notes')">Notizen</button>
    </div>

    <div class="tab-content">

      <!-- Tab: Notizen / Segmente -->
      <div x-show="bottomTab === 'notes'" class="tab-pane">
        <div class="notes-head">
          <h2>Segmente</h2>
          <span x-show="currentMode === 'editor' && lockOwned" class="badge lock">Du bearbeitest</span>
          <span x-show="currentMode === 'editor' && !lockOwned && !online" class="badge offline">Offline-Bearbeitung</span>
        </div>

        <template x-if="project && sortedSegments.length === 0">
          <div class="empty">
            Noch keine Sprungmarken.<br>
            <template x-if="currentMode === 'editor'">
              <span>Tippe auf „＋ Marke", um an der aktuellen Position eine zu setzen.</span>
            </template>
            <template x-if="currentMode === 'training'">
              <span>Wechsle in den Editor-Modus, um Marken anzulegen.</span>
            </template>
          </div>
        </template>

        <template x-for="seg in sortedSegments" :key="seg.id">
          <div class="segment" :id="'seg-' + seg.id" :class="{ active: seg.id === activeSegmentId }">
            <div class="row">
              <button class="ts" @click="seekTo(seg.timestamp)" x-text="fmt(seg.timestamp)"></button>
              <input class="label-input" type="text" placeholder="Label (z.B. Hebung)"
                     :readonly="currentMode !== 'editor'"
                     :value="seg.label"
                     @input="onSegmentInput(seg, 'label', $event.target.value)" />
              <button x-show="currentMode === 'editor'" class="icon danger" @click="deleteSegment(seg)" aria-label="Löschen">🗑</button>
            </div>
            <textarea class="notes" placeholder="Notizen / Bewegung…" rows="2"
                      :readonly="currentMode !== 'editor'"
                      :value="seg.notes"
                      @input="onSegmentInput(seg, 'notes', $event.target.value)"></textarea>
          </div>
        </template>
      </div>

      <!-- Tab: Schritte & Gruppen -->
      <div x-show="bottomTab === 'steps'" class="tab-pane">

        <!-- Paar-Auswahl: bestimmt, welche Schritte in den Spuren gezeigt werden -->
        <div class="field" style="margin-bottom:10px">
          <label>Ich bin Paar</label>
          <select :value="myPersonNumber" @change="setMyPerson($event.target.value)">
            <option value="0">— Paar wählen —</option>
            <template x-for="p in sortedPersons" :key="p.id">
              <option :value="p.number" x-text="'Paar ' + p.number + (p.name ? ' (' + p.name + ')' : '')"></option>
            </template>
          </select>
          <template x-if="myPersonNumber && activePart">
            <p class="hint" style="margin-top:6px">Aktuell (<span x-text="activePart.label"></span>): <strong x-text="myGroup ? 'Gruppe ' + myGroup : 'keine Gruppe / alle gleich'"></strong></p>
          </template>
        </div>

        <!-- Anzeige-Modus -->
        <div class="mode-toggle" style="width:100%;margin-bottom:8px">
          <button :class="{ active: stepDisplay === 'dots' }" @click="setStepDisplay('dots')" style="flex:1">Punkte</button>
          <button :class="{ active: stepDisplay === 'letters' }" @click="setStepDisplay('letters')" style="flex:1">L·S·u</button>
          <button :class="{ active: stepDisplay === 'numbers' }" @click="setStepDisplay('numbers')" style="flex:1">Zahlen</button>
        </div>
        <p class="hint">
          Spuren: <strong>L</strong> = Leader, <strong>F</strong> = Follower &nbsp;·&nbsp;
          <span style="color:#6c8cff">●</span> linker Fuß <span style="color:#ff5a5a">●</span> rechter Fuß &nbsp;·&nbsp;
          L = Lang (2) · S = Schnell (1) · u = „und" (Offbeat)
        </p>

        <template x-if="!isEditor">
          <p class="empty">Zum Eintragen/Einrichten als Editor anmelden.</p>
        </template>
        <template x-if="isEditor && currentMode !== 'editor'">
          <p class="empty">Oben in den <strong>Editor-Modus</strong> wechseln, um Schritte &amp; Gruppen zu bearbeiten.</p>
        </template>

        <template x-if="currentMode === 'editor'">
          <div>
            <!-- ===== Schritte eintragen ===== -->
            <div class="section-title">Schritte eintragen</div>

            <label class="mini-label">Spur</label>
            <div class="mode-toggle" style="width:100%">
              <button :class="{ active: editRole === 'herren' }" @click="setEditRole('herren')" style="flex:1">Leader</button>
              <button :class="{ active: editRole === 'damen' }" @click="setEditRole('damen')" style="flex:1">Follower</button>
            </div>

            <label class="mini-label">Gruppe (0 = alle)</label>
            <div class="calib-row">
              <button class="icon" @click="nudgeEditGroup(-1)">−</button>
              <span class="calib-val" x-text="editGroup === 0 ? 'alle' : ('Gruppe ' + editGroup)"></span>
              <button class="icon" @click="nudgeEditGroup(1)">＋</button>
            </div>

            <label class="mini-label">Fuß</label>
            <div class="mode-toggle" style="width:100%">
              <button :class="{ active: editFoot === 'auto' }" @click="editFoot = 'auto'" style="flex:1">Auto</button>
              <button :class="{ active: editFoot === 'L' }" @click="editFoot = 'L'" style="flex:1;color:#6c8cff">Links</button>
              <button :class="{ active: editFoot === 'R' }" @click="editFoot = 'R'" style="flex:1;color:#ff5a5a">Rechts</button>
            </div>

            <label class="mini-label">Wert</label>
            <div class="mode-toggle" style="width:100%">
              <button :class="{ active: editValue === 'S' }" @click="editValue = 'S'" style="flex:1">S · 1</button>
              <button :class="{ active: editValue === 'L' }" @click="editValue = 'L'" style="flex:1">L · 2</button>
              <button :class="{ active: editValue === 'U' }" @click="editValue = 'U'" style="flex:1">u · und</button>
            </div>

            <label class="mini-label">Raster</label>
            <div class="mode-toggle" style="width:100%">
              <button :class="{ active: editSnap === 'beat' }" @click="editSnap = 'beat'" style="flex:1">ganzer Beat</button>
              <button :class="{ active: editSnap === 'half' }" @click="editSnap = 'half'" style="flex:1">½ Beat</button>
            </div>

            <button class="primary" style="width:100%;margin-top:12px;padding:14px" @click="tapStep()">● Schritt an Position setzen</button>
            <p class="hint">Abspielen und im Takt auf den Button tippen – oder direkt in die L-/F-Spur unter der Welle tippen. Nochmal auf einen Schritt tippen entfernt ihn.</p>

            <div class="section-title" style="display:flex;align-items:center;gap:8px">
              <span style="flex:1">Liste · <span x-text="editRole === 'herren' ? 'Leader' : 'Follower'"></span> · <span x-text="editGroup === 0 ? 'alle' : 'Gr. ' + editGroup"></span></span>
              <button class="danger" style="padding:4px 8px;font-size:12px" @click="clearSteps()">Alle löschen</button>
            </div>
            <template x-if="!editSteps.length"><p class="hint">Noch keine Schritte in dieser Auswahl.</p></template>
            <template x-for="o in editSteps" :key="o.s.id">
              <div class="step-row">
                <button class="ts" @click="seekTo(o.t)" x-text="fmt(o.t)"></button>
                <button class="foot-chip" :class="o.s.foot === 'R' ? 'foot-r' : 'foot-l'" @click="toggleStepFoot(o.s)" x-text="o.s.foot === 'R' ? 'R' : 'L'"></button>
                <span class="step-val" x-text="isOffbeat(o.s) ? 'u' : (Number(o.s.length_beats) >= 2 ? 'L' : 'S')"></span>
                <button class="icon danger" @click="deleteStep(o.s)" aria-label="Schritt löschen">🗑</button>
              </div>
            </template>

            <!-- ===== Abschnitte & Gruppen ===== -->
            <div class="section-title" style="margin-top:20px">Abschnitte &amp; Gruppen</div>
            <p class="hint">Abschnitt anlegen (z.B. Sek 22–26), dann jedem Paar eine Gruppe geben (Tippen schaltet weiter: – ▸ 1 ▸ 2 …). „–" = alle gleich. Ein Paar sieht im Abschnitt die Schritte seiner Gruppe.</p>
            <template x-for="part in sortedParts" :key="part.id">
              <div class="tempo-card">
                <div class="tc-head">
                  <input class="tc-label" type="text" :value="part.label || ''" placeholder="Abschnitt-Name" @input="patchPart(part, { label: $event.target.value })" />
                  <button class="icon danger" @click="removePart(part)" aria-label="Abschnitt löschen">🗑</button>
                </div>
                <div class="field two" style="margin-bottom:8px">
                  <div style="flex:1"><label>Start (s)</label>
                    <div class="calib-row" style="margin:0;gap:6px">
                      <input type="number" step="0.001" min="0" :value="part.start_sec" @change="setPartBound(part,'start_sec',$event.target.value)" />
                      <button class="icon" @click="partBoundToCursor(part,'start_sec')" title="auf Abspielposition">🎯</button>
                    </div>
                  </div>
                  <div style="flex:1"><label>Ende (s)</label>
                    <div class="calib-row" style="margin:0;gap:6px">
                      <input type="number" step="0.001" min="0" :value="part.end_sec ?? ''" placeholder="Schluss" @change="setPartBound(part,'end_sec',$event.target.value)" />
                      <button class="icon" @click="partBoundToCursor(part,'end_sec')" title="auf Abspielposition">🎯</button>
                    </div>
                  </div>
                </div>
                <label class="mini-label">Gruppen-Zuteilung (pro Paar)</label>
                <div class="chip-grid">
                  <template x-for="p in sortedPersons" :key="p.id">
                    <button class="grp-chip" :class="'g' + groupOf(part, p.number)" @click="cycleGroup(part, p.number)">
                      <span x-text="p.number"></span>
                      <span class="grp-tag" x-text="groupOf(part, p.number) ? ('G' + groupOf(part, p.number)) : '–'"></span>
                    </button>
                  </template>
                </div>
                <template x-if="!sortedPersons.length"><p class="hint">Erst Paare anlegen.</p></template>
              </div>
            </template>
            <button class="primary" style="width:100%;margin-top:4px" @click="addPart()">＋ Abschnitt</button>

            <!-- ===== Paare ===== -->
            <div class="section-title" style="margin-top:20px">Paare</div>
            <template x-for="p in sortedPersons" :key="p.id">
              <div class="person-row">
                <span class="person-num" x-text="p.number"></span>
                <input type="text" :value="p.name || ''" placeholder="Name (optional)" @input="renamePerson(p, $event.target.value)" />
                <button class="icon danger" @click="removePerson(p)" aria-label="Paar löschen">🗑</button>
              </div>
            </template>
            <template x-if="!sortedPersons.length"><p class="hint">Noch keine Paare.</p></template>
            <button class="primary" style="width:100%;margin:4px 0 4px" @click="addPerson()">＋ Paar</button>
          </div>
        </template>
      </div>

    </div>
  </section>

  <!-- ===== Off-Canvas Menü (Projekte & Upload) ===== -->
  <template x-if="menuOpen">
    <div>
      <div class="scrim" @click="menuOpen = false"></div>
      <aside class="drawer">
        <header>
          <h2>Projekte</h2>
          <span x-show="!online" class="badge offline">offline</span>
          <button class="icon" @click="menuOpen = false" aria-label="Schließen">✕</button>
        </header>
        <div class="body">
          <!-- Editor-Status / Login -->
          <div class="editor-bar">
            <template x-if="isEditor">
              <div class="eb-row"><span class="eb-on">✏️ Editor aktiv</span><button @click="logout()">Abmelden</button></div>
            </template>
            <template x-if="!isEditor">
              <div class="eb-row"><span class="eb-off">🔒 Nur Lesen</span><button class="primary" @click="openLogin()">Editor anmelden</button></div>
            </template>
          </div>

          <template x-for="p in projects" :key="p.id">
            <div class="project-item" :class="{ active: project && p.id === project.id }" @click="openProject(p)">
              <div class="pi-main">
                <div class="pi-title" x-text="p.title"></div>
                <div class="pi-meta" x-text="`${p.bpm} BPM · ${p.time_signature}`"></div>
              </div>
              <button x-show="isEditor" class="icon danger" @click.stop="confirmDeleteProject(p)" aria-label="Projekt löschen">🗑</button>
            </div>
          </template>
          <template x-if="projects.length === 0">
            <div class="empty" style="padding:20px 0" x-text="online ? 'Noch keine Projekte.' : 'Offline – keine zwischengespeicherten Projekte.'"></div>
          </template>

          <template x-if="isEditor"><div>
          <div class="section-title">Neues Projekt</div>
          <div class="field">
            <label>Titel</label>
            <input type="text" x-model="form.title" placeholder="z.B. Kür 2026" />
          </div>
          <div class="field two">
            <div style="flex:1">
              <label>BPM</label>
              <input type="number" min="20" max="400" step="0.01" x-model.number="form.bpm" />
            </div>
            <div style="flex:1">
              <label>Taktart</label>
              <select x-model="form.time_signature">
                <option>4/4</option>
                <option>3/4</option>
                <option>2/4</option>
                <option>6/8</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Audio-Datei (MP3 / WAV)</label>
            <label class="filedrop">
              <input type="file" accept=".mp3,.wav,audio/mpeg,audio/wav,audio/x-wav" style="display:none" @change="onFilePick($event)" />
              <template x-if="!form.file"><span>Tippen, um Datei zu wählen</span></template>
              <template x-if="form.file"><span><strong x-text="form.file.name"></strong><br><span x-text="prettySize(form.file.size)"></span></span></template>
            </label>
          </div>

          <template x-if="uploading">
            <div class="field">
              <div style="font-size:13px;color:var(--muted)" x-text="`Lade hoch… ${Math.round(uploadProgress*100)}%`"></div>
              <div class="progress"><div :style="`width:${uploadProgress*100}%`"></div></div>
              <button style="margin-top:10px;width:100%" class="danger" @click="abortUpload()">Abbrechen</button>
            </div>
          </template>
          <template x-if="uploadError">
            <div class="field" style="color:var(--danger);font-size:13px" x-text="uploadError"></div>
          </template>

          <button class="primary" style="width:100%;margin-top:6px"
                  :disabled="uploading || !form.title || !form.file || !online"
                  @click="createProject()"
                  x-text="online ? 'Projekt anlegen & hochladen' : 'Offline – Anlegen nicht möglich'"></button>
          </div></template>
        </div>
        <div class="drawer-foot">v<span x-text="version"></span></div>
      </aside>
    </div>
  </template>

  <!-- ===== Projekt-Einstellungen / Tempo-Abschnitte ===== -->
  <template x-if="settingsOpen && project">
    <div>
      <div class="scrim" @click="closeSettings()"></div>
      <div class="modal modal-lg">
        <header>
          <h2>Projekt &amp; Takt</h2>
          <button class="icon" @click="closeSettings()" aria-label="Schließen">✕</button>
        </header>
        <div class="body">
          <div class="field">
            <label>Titel</label>
            <input type="text" :value="project.title" @input="patchProject({ title: $event.target.value })" />
          </div>

          <div class="section-title">Tempo-Abschnitte (Lieder)</div>
          <p class="hint">Mehrere Lieder/Tempi in einer Audiodatei: pro Abschnitt Start/Ende, BPM, Taktart und Raster-Start. Abschnitte dürfen sich nicht überlappen. „Ende" leer = bis zum Schluss.</p>

          <template x-for="sec in sortedTempo" :key="sec.id">
            <div class="tempo-card">
              <div class="tc-head">
                <input class="tc-label" type="text" :value="sec.label || ''" placeholder="Abschnitt-Name"
                       @input="patchTempo(sec, { label: $event.target.value })" />
                <button class="icon danger" x-show="sortedTempo.length > 1" @click="deleteTempoSection(sec)" aria-label="Abschnitt löschen">🗑</button>
              </div>

              <div class="field two" style="margin-bottom:8px">
                <div style="flex:1">
                  <label>Start (s)</label>
                  <div class="calib-row" style="margin:0;gap:6px">
                    <input type="number" step="0.001" min="0" :value="sec.start_sec"
                           @change="setTempoBound(sec,'start_sec',$event.target.value)" />
                    <button class="icon" @click="boundToCursor(sec,'start_sec')" title="auf Abspielposition">🎯</button>
                  </div>
                </div>
                <div style="flex:1">
                  <label>Ende (s)</label>
                  <div class="calib-row" style="margin:0;gap:6px">
                    <input type="number" step="0.001" min="0" :value="sec.end_sec ?? ''" placeholder="Schluss"
                           @change="setTempoBound(sec,'end_sec',$event.target.value)" />
                    <button class="icon" @click="boundToCursor(sec,'end_sec')" title="auf Abspielposition">🎯</button>
                  </div>
                </div>
              </div>

              <div class="field" style="margin-bottom:8px">
                <label>Taktart</label>
                <select :value="sec.time_signature" @change="setTimeSig(sec,$event.target.value)">
                  <option>4/4</option><option>3/4</option><option>2/4</option><option>6/8</option>
                </select>
              </div>

              <label class="mini-label">BPM</label>
              <div class="calib-row">
                <button class="icon" @click="nudgeBpm(sec,-1)">−1</button>
                <button class="icon" @click="nudgeBpm(sec,-0.1)">−.1</button>
                <input class="calib-val" type="number" step="0.01" min="20" max="400"
                       :value="Number(sec.bpm).toFixed(2)" @change="onBpmInput(sec,$event.target.value)" />
                <button class="icon" @click="nudgeBpm(sec,0.1)">+.1</button>
                <button class="icon" @click="nudgeBpm(sec,1)">+1</button>
              </div>

              <label class="mini-label">Takt-Abstand · <strong x-text="barLengthOf(sec).toFixed(3) + ' s'"></strong></label>
              <div class="calib-row">
                <button class="icon" @click="nudgeBarLength(sec,-0.01)">−10ms</button>
                <button class="icon" @click="nudgeBarLength(sec,-0.001)">−1ms</button>
                <button class="icon" @click="nudgeBarLength(sec,0.001)">+1ms</button>
                <button class="icon" @click="nudgeBarLength(sec,0.01)">+10ms</button>
              </div>

              <label class="mini-label">Raster-Start (Intro-Offset)</label>
              <div class="calib-row">
                <button class="icon" @click="nudgeOffset(sec,-0.05)">−50ms</button>
                <button class="icon" @click="nudgeOffset(sec,-0.005)">−5ms</button>
                <span class="calib-val" x-text="(Number(sec.offset_sec)||0).toFixed(3) + ' s'"></span>
                <button class="icon" @click="nudgeOffset(sec,0.005)">+5ms</button>
                <button class="icon" @click="nudgeOffset(sec,0.05)">+50ms</button>
              </div>
              <div class="calib-row">
                <button style="flex:1" @click="offsetToCursor(sec)">🎯 auf Abspielposition</button>
                <button @click="resetOffset(sec)">⟲ Reset</button>
              </div>
            </div>
          </template>

          <button class="primary" style="width:100%;margin-top:4px" @click="addTempoSection()">＋ Abschnitt hinzufügen</button>

          <div class="calib-row" style="margin-top:16px">
            <button @click="togglePlay()" x-text="isPlaying ? 'Pause' : 'Abspielen'"></button>
            <button class="primary" style="flex:1" @click="closeSettings()">Fertig</button>
          </div>
          <p class="hint" x-show="!online">Offline – Änderungen werden synchronisiert, sobald wieder Netz da ist.</p>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Name-Modal (einmalig) ===== -->
  <template x-if="nameModalOpen">
    <div>
      <div class="scrim"></div>
      <div class="modal">
        <header><h2>Willkommen 🎵</h2></header>
        <div class="body">
          <p style="margin-top:0;color:var(--muted);font-size:14px">
            Sag uns deinen Namen – so sehen Mitnutzer, wer ein Projekt gerade bearbeitet.
          </p>
          <input type="text" x-model="nameInput" placeholder="Dein Name" @keydown.enter="saveName()" />
          <button class="primary" style="width:100%;margin-top:12px" :disabled="!nameInput.trim()" @click="saveName()">Los geht's</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Editor-Login ===== -->
  <template x-if="loginOpen">
    <div>
      <div class="scrim" @click="closeLogin()"></div>
      <div class="modal">
        <header><h2>Editor anmelden 🔒</h2><button class="icon" @click="closeLogin()" aria-label="Schließen">✕</button></header>
        <div class="body">
          <p class="hint">Bearbeiten ist nur mit dem gemeinsamen Editor-Passwort möglich. Ansehen &amp; Training geht für alle ohne Login.</p>
          <div class="pw-row">
            <input :type="showPw ? 'text' : 'password'" x-model="loginPassword" placeholder="Editor-Passwort"
                   autocomplete="current-password" @keydown.enter="doLogin()" />
            <button type="button" class="icon" @click="showPw = !showPw"
                    :aria-label="showPw ? 'Passwort verbergen' : 'Passwort anzeigen'" x-text="showPw ? '🙈' : '👁'"></button>
          </div>
          <div x-show="loginError" style="color:var(--danger);font-size:13px;margin-top:8px" x-text="loginError"></div>
          <button class="primary" style="width:100%;margin-top:12px"
                  :disabled="!loginPassword || loggingIn" @click="doLogin()"
                  x-text="loggingIn ? 'Anmelden…' : 'Anmelden'"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Status-Toast ===== -->
  <template x-if="toast">
    <div id="toast" x-text="toast"></div>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
